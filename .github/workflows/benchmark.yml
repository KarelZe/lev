name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '!docs/**'
  pull_request:
    paths:
      - '**'
      - '!docs/**'

jobs:
  benchmarks:
    name: CodSpeed benchmarks (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14", "3.15"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build and install extension
        run: pip install maturin && maturin build --release && pip install target/wheels/*.whl

      - name: Install benchmark deps
        run: pip install pytest pytest-codspeed pytest-cov

      - uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          mode: simulation
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: pytest tests/test_lev.py --codspeed --no-cov
