# see: https://prek.j178.dev/integrations/?h=ci+#verifying-images
name: prek checks
on: [push, pull_request]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: j178/prek-action@v2
