[project]
site_name        = "lev"
site_description = "lev is an extremely fast Python library for Levenshtein distance, written in Rust. 🦀"
site_author      = "KarelZe"
site_url         = "https://KarelZe.github.io/lev/"
repo_url         = "https://github.com/KarelZe/lev"
repo_name        = "KarelZe/lev"
edit_uri = "edit/main/docs/"

nav = [
  { Home = "index.md" },
  { "API Reference" = "api.md" },
]

[project.theme]
variant  = "modern"
language = "en"

features = [
  "content.code.copy",
  "content.code.annotate",
  "navigation.instant",
  "navigation.tracking",
  "navigation.top",
  "search.highlight",
  "search.suggest",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme      = "slate"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme      = "default"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/KarelZe/lev"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/markus-bilz/"

[project.plugins.search]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style            = "google"
show_root_heading          = true
show_source                = true
show_signature_annotations = true
separate_signature         = true
inherited_members          = true

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.admonition]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]
